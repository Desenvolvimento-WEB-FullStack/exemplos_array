<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exemplos</title>

    <style>
      .form_container {
        width: 50%;
        margin: 40px auto;
        padding: 10px;
        min-height: 80px;
        background-color: #e9634c;

        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }

      input {
        height: 34px;
        border-radius: 8px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <form id="form_pesquisa" class="form_container">
      <input placeholder="Digite o código do pet" id="codigo" required />

      <h1 id="nome"></h1>
    </form>
    <script src="index.js"></script>
  </body>
</html>
